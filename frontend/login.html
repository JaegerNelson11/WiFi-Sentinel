<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wi-Fi Sentinel — Sign in</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.login-body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .login-card {
      width: 450px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 35px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .login-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: var(--text);
    }

    .login-title svg {
      width: 26px;
      height: 26px;
      stroke: var(--green);
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .login-tab {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 9px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .login-tab.active {
      color: var(--text);
      border-bottom-color: var(--green);
    }

    .login-card label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
      margin-top: 16px;
    }

    .login-card input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      outline: none;
    }

    .login-card input:focus {
      border-color: var(--green);
    }

    .login-card button.primary {
      width: 100%;
      margin-top: 26px;
      background: var(--green);
      color: #0a0c10;
      border: none;
      padding: 13px;
      border-radius: 7px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }

    .login-card button.primary:hover { filter: brightness(1.1); }
    .login-card button.primary:disabled { opacity: 0.6; cursor: not-allowed; }

    #login-error {
      margin-top: 16px;
      min-height: 18px;
      color: var(--red);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }

    .login-footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="login-body">
  <form class="login-card" id="login-form" autocomplete="on">
    <div class="login-title">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M1.5 8.5a13 13 0 0 1 21 0M5 12a10 10 0 0 1 14 0M8.5 15.5a6 6 0 0 1 7 0M12 19h.01" />
      </svg>
      <span>Wi-Fi Sentinel</span>
    </div>

    <div class="login-tabs" id="login-tabs">
      <button class="login-tab active" type="button" data-mode="login">Sign in</button>
      <button class="login-tab" type="button" data-mode="register" id="tab-register">Register</button>
    </div>

    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required autofocus />

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />

    <button id="login-submit" class="primary" type="submit">Sign in</button>
    <div id="login-error" role="alert" aria-live="polite"></div>

    <div class="login-footer">authorized access only</div>
  </form>

  <script src="login.js"></script>
</body>
</html>
